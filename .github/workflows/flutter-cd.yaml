name: Flutter CD

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review ]

concurrency:
  group: flutter-cd-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  android_release_build:
    name: Android Release Build
    if: github.event.pull_request.head.ref == 'develop' && !github.event.pull_request.draft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Flutter via FVM
        run: |
          fvm install
          fvm use --force

      - name: Ensure env files
        run: bash scripts/ensure_env_files.sh

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Restore release files
        env:
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          if [ -z "$ANDROID_KEY_PROPERTIES" ] || [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_GOOGLE_SERVICES_JSON" ] || [ -z "$ENV_PRODUCTION" ]; then
            echo "::error::Required release secrets are missing."
            exit 1
          fi

          KEYSTORE_BASE64_CLEAN=$(printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')

          printf '%s' "$ANDROID_KEY_PROPERTIES" > android/key.properties
          if ! printf '%s' "$KEYSTORE_BASE64_CLEAN" | base64 --decode > android/upload-keystore.jks; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not valid base64."
            exit 1
          fi
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > android/app/google-services.json
          printf '%s' "$ENV_PRODUCTION" > .env.production

      - name: Build Android appbundle
        run: fvm flutter build appbundle --release --dart-define=APP_ENV=production

      - name: Build Android apk
        run: fvm flutter build apk --release --dart-define=APP_ENV=production

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.event.pull_request.number }}
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios_release_build:
    name: iOS Release Build
    if: github.event.pull_request.head.ref == 'develop' && !github.event.pull_request.draft
    runs-on: macos-15

    env:
      APP_ENV: production
      BUNDLE_IDENTIFIER: com.washer.v2
      IOS_EXPORT_METHOD: app-store

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Flutter via FVM
        run: |
          fvm install
          fvm use --force

      - name: Ensure env files
        run: bash scripts/ensure_env_files.sh

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Restore production env
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          if [ -z "$ENV_PRODUCTION" ]; then
            echo "::error::ENV_PRODUCTION secret is missing."
            exit 1
          fi
          printf '%s' "$ENV_PRODUCTION" > .env.production

      - name: Install signing certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ] || [ -z "$P12_PASSWORD" ] || [ -z "$BUILD_PROVISION_PROFILE_BASE64" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error::iOS signing secrets are missing."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles"

      - name: Resolve iOS version metadata
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | head -n 1 | awk '{print $2}')"
          VERSION_NAME="${VERSION_LINE%%+*}"

          if [ -z "$VERSION_NAME" ]; then
            echo "::error::Unable to parse version from pubspec.yaml"
            exit 1
          fi

          echo "IOS_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "IOS_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build iOS release IPA
        run: bundle exec fastlane ios build_release_ipa

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ github.event.pull_request.number }}
          path: build/ios/ipa/Runner.ipa
          if-no-files-found: error

name: Android Play Store CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      track:
        description: Google Play track to upload to
        required: false
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: Google Play release status
        required: false
        default: completed
        type: choice
        options:
          - completed
          - draft
          - inProgress
          - halted

permissions:
  contents: read

concurrency:
  group: android-playstore-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android_play_store_upload:
    name: Build And Upload Android To Play Store
    runs-on: ubuntu-latest

    env:
      APP_ENV: production
      PLAY_STORE_TRACK: ${{ inputs.track || vars.PLAY_STORE_TRACK || 'internal' }}
      PLAY_STORE_RELEASE_STATUS: ${{ inputs.release_status || vars.PLAY_STORE_RELEASE_STATUS || 'completed' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler: 2.5.23
          bundler-cache: true

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Flutter via FVM
        run: |
          fvm install
          fvm use --force

      - name: Ensure env files
        run: bash scripts/ensure_env_files.sh

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Restore Android release files
        env:
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          if [ -z "$ANDROID_KEY_PROPERTIES" ] || [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_GOOGLE_SERVICES_JSON" ] || [ -z "$ENV_PRODUCTION" ]; then
            echo "::error::Required Android release secrets are missing."
            exit 1
          fi

          KEYSTORE_BASE64_CLEAN=$(printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')

          printf '%s' "$ANDROID_KEY_PROPERTIES" > android/key.properties
          if ! printf '%s' "$KEYSTORE_BASE64_CLEAN" | base64 --decode > android/upload-keystore.jks; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is not valid base64."
            exit 1
          fi
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > android/app/google-services.json
          printf '%s' "$ENV_PRODUCTION" > .env.production

      - name: Restore Play Store service account
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          PLAY_STORE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          JSON_KEY_PATH="$RUNNER_TEMP/play-store-service-account.json"

          if [ -n "$PLAY_STORE_SERVICE_ACCOUNT_JSON_BASE64" ]; then
            SERVICE_ACCOUNT_BASE64_CLEAN=$(printf '%s' "$PLAY_STORE_SERVICE_ACCOUNT_JSON_BASE64" | tr -d '\r\n\t ')
            if ! printf '%s' "$SERVICE_ACCOUNT_BASE64_CLEAN" | base64 --decode > "$JSON_KEY_PATH"; then
              echo "::error::PLAY_STORE_SERVICE_ACCOUNT_JSON_BASE64 is not valid base64."
              exit 1
            fi
          elif [ -n "$PLAY_STORE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$PLAY_STORE_SERVICE_ACCOUNT_JSON" > "$JSON_KEY_PATH"
          else
            echo "::error::PLAY_STORE_SERVICE_ACCOUNT_JSON or PLAY_STORE_SERVICE_ACCOUNT_JSON_BASE64 secret is required."
            exit 1
          fi

          echo "PLAY_STORE_JSON_KEY_PATH=$JSON_KEY_PATH" >> "$GITHUB_ENV"

      - name: Resolve Android version metadata
        env:
          ANDROID_BUILD_NUMBER_VAR: ${{ vars.ANDROID_BUILD_NUMBER }}
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | head -n 1 | awk '{print $2}')"
          VERSION_NAME="${VERSION_LINE%%+*}"
          BUILD_NUMBER="${ANDROID_BUILD_NUMBER_VAR:-$GITHUB_RUN_NUMBER}"

          if [ -z "$VERSION_NAME" ] || [ -z "$BUILD_NUMBER" ]; then
            echo "::error::Unable to resolve Android version metadata."
            exit 1
          fi

          case "$BUILD_NUMBER" in
            *[!0-9]*|'')
              echo "::error::ANDROID_BUILD_NUMBER must be numeric."
              exit 1
              ;;
          esac

          echo "ANDROID_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "ANDROID_BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Build and upload to Play Store
        run: bundle exec fastlane android upload_play_store

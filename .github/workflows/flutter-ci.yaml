name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

jobs:
  flutter_test_and_build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[CI]'))
    steps:
      - uses: actions/checkout@v3

      # Dart 설치 (FVM 사용을 위해 필요)
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      # FVM 설치
      - name: Install FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      # FVM을 통해 Flutter 설치
      - name: Install Flutter via FVM
        run: |
          fvm install
          fvm use --force

      # FVM config에서 Flutter 버전 읽어서 환경변수에 저장 (알림용)
      - name: Read Flutter version from FVM
        run: |
          if [ -f ".fvm/fvm_config.json" ]; then
            FLUTTER_VER=$(cat .fvm/fvm_config.json | grep -o '"flutterSdkVersion": "[^"]*' | cut -d'"' -f4)
            echo "FLUTTER_VERSION=$FLUTTER_VER" >> $GITHUB_ENV
          elif [ -f "fvm_config.json" ]; then
            FLUTTER_VER=$(cat fvm_config.json | grep -o '"flutterSdkVersion": "[^"]*' | cut -d'"' -f4)
            echo "FLUTTER_VERSION=$FLUTTER_VER" >> $GITHUB_ENV
          else
            echo "FLUTTER_VERSION=unknown" >> $GITHUB_ENV
          fi

      # Flutter 버전 확인
      - name: Check Flutter version
        run: fvm flutter --version

      # 의존성 설치
      - name: Install dependencies
        run: fvm flutter pub get

      # 코드 분석
      - name: Analyze project source
        run: fvm flutter analyze --no-fatal-infos
        continue-on-error: true

      # 테스트 실행
      - name: Run tests
        run: fvm flutter test
        continue-on-error: true

      # Android APK 빌드 (main 브랜치에 push 시에만)
      - name: Build Android APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: fvm flutter build apk --release
        continue-on-error: true

      # APK 업로드 (main 브랜치에 push 시에만)
      - name: Upload APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn

      # Discord 알림
      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "::warning::Discord webhook URL is not set. Skipping notification."
            exit 0
          fi
          
          SERVER_URL="${{ github.server_url }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            EVENT_INFO="PR #${{ github.event.number }}: ${{ github.event.pull_request.title }} (${{ github.event.pull_request.html_url }})"
          else
            EVENT_INFO="커밋: ${{ github.event.head_commit.message }} ($SERVER_URL/${{ github.repository }}/commit/${{ github.sha }})"
          fi
          
          FLUTTER_INFO="Flutter 버전: ${{ env.FLUTTER_VERSION }}"
          
          if [ "${{ job.status }}" = "success" ]; then
            TITLE="✅ CI/CD 파이프라인 성공"
            DESCRIPTION="모든 작업이 성공적으로 완료되었습니다! 🎉\n$FLUTTER_INFO"
          else
            TITLE="❌ CI/CD 파이프라인 실패"
            DESCRIPTION="GitHub Actions 로그를 확인해주세요. 🔍\n$FLUTTER_INFO"
          fi
          
          curl -H "Content-Type: application/json" -X POST -d "{
            \"content\": \"$TITLE\n$DESCRIPTION\n$EVENT_INFO\"
          }" "$DISCORD_WEBHOOK"